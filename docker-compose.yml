services:
  postgres:
    image: postgres:17-alpine
    container_name: sql-coach-db
    environment:
      POSTGRES_DB: sql_coach
      POSTGRES_USER: coach_admin
      POSTGRES_PASSWORD: coach_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-roles.sql:/docker-entrypoint-initdb.d/01-init-roles.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach_admin -d sql_coach"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
