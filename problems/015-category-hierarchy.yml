slug: category-hierarchy
title: "Category Hierarchy Path"
difficulty: hard
category: ctes
tags: [ctes, hierarchy, string-concatenation]
domain: ecommerce
tables: [categories]
description: |
  The `categories` table is self-referential: each row has a `parent_category_id` that points to its parent row (or `NULL` for top-level categories). Together they form a tree — potentially several levels deep.

  For every category in the table, return its name and the **full path from the root** to that category, joined with `" > "`. Top-level categories have a path equal to just their own name.

  Example: a category named `Phones` whose parent is `Electronics` (and `Electronics` is top-level) should have `full_path` = `"Electronics > Phones"`.

  Return the following columns:
  - `name` - the category name
  - `full_path` - the complete hierarchy path using " > " as a separator

  Order the results by `full_path` ascending.
hints:
  - "You need to walk the tree from each top-level category down to its descendants, building the path as you go. A single SELECT can't do this — you have to join the categories table to itself an unknown number of times."
  - "Postgres has a dedicated language feature for exactly this: a query that references its own output. Look up CTEs that reference themselves."
  - "`WITH RECURSIVE` lets you define an anchor member (the top-level categories, where parent_id IS NULL) and a recursive member (join categories back to the CTE on parent_category_id = ct.id, extending full_path with `' > ' || c.name`). The final SELECT reads from the recursive CTE."
order_matters: true
solution: |
  WITH RECURSIVE category_tree AS (
    SELECT
      id,
      name,
      name::TEXT AS full_path
    FROM categories
    WHERE parent_category_id IS NULL

    UNION ALL

    SELECT
      c.id,
      c.name,
      ct.full_path || ' > ' || c.name
    FROM categories c
    JOIN category_tree ct ON c.parent_category_id = ct.id
  )
  SELECT name, full_path
  FROM category_tree
  ORDER BY full_path;
expected_columns: [name, full_path]
