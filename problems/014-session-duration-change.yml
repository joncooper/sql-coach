slug: session-duration-change
title: "Session Duration Change"
difficulty: hard
category: window-functions
tags: [window-functions, timestamps, per-row-comparison]
domain: analytics
tables: [users, sessions]
description: |
  For each user session, report the session's **duration in whole minutes** and the **change in duration from that user's previous session**.

  A user's first session should have a NULL change (there's nothing to compare against). All other sessions should show `current_duration - previous_duration` in minutes.

  Return the following columns:
  - `username` - the user's username
  - `started_at` - when the session started
  - `duration_minutes` - the session duration in whole minutes (integer)
  - `prev_duration_change` - the current session's duration minus the previous session's duration, in minutes; `NULL` for the user's first session

  Order the results by `username` ascending, then `started_at` ascending.
hints:
  - "Two subproblems: (1) turn a timestamp range into whole minutes, (2) for each row, reach back to the *same user's* previous session. Both have clean Postgres idioms."
  - "For duration: `ended_at - started_at` gives an interval; you need a way to pull the number of seconds out of it so you can divide by 60. For the per-user lookback: a family of Postgres functions lets you peek at the row before the current one within a group."
  - "`EXTRACT(EPOCH FROM (ended_at - started_at)) / 60` gives fractional minutes (cast to INT). For the lookback, `LAG(expr) OVER (PARTITION BY user_id ORDER BY started_at)` returns the previous row's value per user, or NULL on the first row."
order_matters: true
solution: |
  SELECT
    u.username,
    s.started_at,
    (EXTRACT(EPOCH FROM (s.ended_at - s.started_at)) / 60)::INTEGER AS duration_minutes,
    (EXTRACT(EPOCH FROM (s.ended_at - s.started_at)) / 60)::INTEGER
      - LAG((EXTRACT(EPOCH FROM (s.ended_at - s.started_at)) / 60)::INTEGER)
        OVER (PARTITION BY s.user_id ORDER BY s.started_at)
    AS prev_duration_change
  FROM sessions s
  JOIN users u ON s.user_id = u.id
  ORDER BY u.username, s.started_at;
expected_columns: [username, started_at, duration_minutes, prev_duration_change]
