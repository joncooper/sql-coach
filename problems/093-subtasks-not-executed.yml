slug: subtasks-not-executed
title: "Find the Subtasks That Did Not Execute"
difficulty: hard
category: joins
tags: [anti-join, cross-join]
domain: lc1914
tables: [tasks, executed]
description: |
  You are given two tables:

  - **Tasks**: each row has a `task_id` and a `subtasks_count` indicating how many subtasks it has (labeled 1 through `subtasks_count`). The `subtasks_count` is between 2 and 20.
  - **Executed**: each row records that a given `subtask_id` was executed successfully for a given `task_id`.

  Find every `(task_id, subtask_id)` pair that **should exist** (because the task has that many subtasks) but is **missing from `executed`**.

  Return the following columns in this exact order:
  - `task_id` - the task identifier
  - `subtask_id` - the missing subtask identifier

  Return the result in **any order**.
hints:
  - "The `executed` table only has rows for subtasks that ran. But the *expected* set of (task, subtask) pairs isn't in any table — it only exists implicitly, as \"subtasks 1 through N for each task.\" You have to materialize that expected set first, then subtract what actually ran."
  - "To materialize the expected set, you need a way to produce rows `1..N` for each task. Think about which Postgres feature can turn a number `N` into a series of rows; it's part of the standard library, and the Postgres docs for set-returning functions are the right place to look."
  - "`CROSS JOIN LATERAL generate_series(1, t.subtasks_count) AS s(subtask_id)` produces every expected pair. LEFT JOIN `executed` onto that and filter for NULL matches to get the missing ones."
order_matters: false
solution: |
  SELECT
    t.task_id,
    s.subtask_id
  FROM tasks t
  CROSS JOIN LATERAL generate_series(1, t.subtasks_count) AS s(subtask_id)
  LEFT JOIN executed e
    ON t.task_id = e.task_id
    AND s.subtask_id = e.subtask_id
  WHERE e.task_id IS NULL;
expected_columns: [task_id, subtask_id]
