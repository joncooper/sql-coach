slug: consecutive-order-days
title: "Customers with Consecutive Order Days"
difficulty: hard
category: window-functions
tags: [window-functions, date-arithmetic, distinct]
domain: ecommerce
tables: [customers, orders]
description: |
  Find customers who have placed **two orders within one day of each other** — meaning either on the same day, or on consecutive calendar days (difference of 0 or 1 between the two order dates).

  A customer should appear in the output if *any* pair of their orders satisfies this condition.

  Return the following columns:
  - `customer_name` - the customer's name (distinct values only)

  Order the results by `customer_name` ascending.
hints:
  - "You need to compare each order against the *previous* order from the same customer. Think about how to line up each row with its predecessor in a group without writing a self-join."
  - "Postgres has a family of functions that peek at the row before or after the current one within a group. Pair one of them with `PARTITION BY customer ORDER BY order_date`."
  - "`LAG(order_date) OVER (PARTITION BY customer_id ORDER BY order_date)` gives you the customer's previous order date for each row. Subtract, filter to `<= 1`, and wrap in SELECT DISTINCT to dedupe customer names."
order_matters: true
solution: |
  SELECT DISTINCT
    customer_name
  FROM (
    SELECT
      c.name AS customer_name,
      o.order_date,
      LAG(o.order_date) OVER (PARTITION BY c.id ORDER BY o.order_date) AS prev_order_date
    FROM customers c
    JOIN orders o ON o.customer_id = c.id
  ) sub
  WHERE order_date - prev_order_date <= 1
  ORDER BY customer_name;
expected_columns: [customer_name]
