slug: quiet-students-in-exams
title: "Find the Quiet Students in All Exams"
difficulty: hard
category: window-functions
tags: [window-functions, anti-join]
domain: lc1546
tables: [student, exam]
description: |
  A "quiet" student is one who took **at least one exam** and **never scored either the highest or the lowest** on any exam they took. Find all quiet students.

  Students who never took any exam do not appear in the output. Students who were ever the top scorer or the bottom scorer in any exam (even by a single point, even if they only took one exam) do not appear.

  Return the following columns in this exact order:
  - `student_id` - the student's ID
  - `student_name` - the student's name

  Order the results by `student_id` in **ascending** order.
hints:
  - "This is an exclusion problem: find the students who took exams, then subtract the students who were ever the extreme scorer on any exam. Think about how to identify 'the highest score in exam X' and 'the lowest score in exam X' in a way that lets you compare each row to its own exam's extremes."
  - "You need the per-exam min and max alongside each (student, exam, score) row — not as a GROUP BY result. That shape is the job of aggregate functions used as window functions. Pair them with `PARTITION BY exam_id` so the min/max restart per exam."
  - "In a CTE, add `MIN(score) OVER (PARTITION BY exam_id)` and `MAX(score) OVER (PARTITION BY exam_id)` to each exam row. Pull out the distinct set of students whose score ever equals their exam's min or max — those are the \"loud\" students. The quiet students are the ones who took an exam but are not loud."
order_matters: false
solution: |
  WITH exam_extremes AS (
    SELECT
      exam_id,
      student_id,
      score,
      MIN(score) OVER (PARTITION BY exam_id) AS min_score,
      MAX(score) OVER (PARTITION BY exam_id) AS max_score
    FROM exam
  ),
  loud_students AS (
    SELECT DISTINCT student_id
    FROM exam_extremes
    WHERE score = min_score OR score = max_score
  ),
  exam_takers AS (
    SELECT DISTINCT student_id
    FROM exam
  )
  SELECT
    s.student_id,
    s.student_name
  FROM student s
  JOIN exam_takers et ON s.student_id = et.student_id
  WHERE s.student_id NOT IN (SELECT student_id FROM loud_students)
  ORDER BY s.student_id;
expected_columns: [student_id, student_name]
