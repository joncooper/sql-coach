slug: apples-oranges
title: "Apples & Oranges"
difficulty: medium
category: joins
tags: [self-join, conditional, pivoting]
domain: leetcode
tables: [leetcode.lc1578_sales]
description: |
  You have a sales table that records the number of apples and oranges sold each day.

  Write a query to report the difference between the number of apples and oranges sold each day. The difference is calculated as (apples sold - oranges sold).

  Return the following columns in this exact order:
  - `sale_date` - the date of the sale
  - `diff` - the difference between apples and oranges sold on that day

  Order the results by `sale_date` in **ascending** order.
hints:
  - "Each date has two rows: one for apples and one for oranges. You need to combine them into a single row per date."
  - "Consider joining the table to itself on sale_date, where one side filters for apples and the other for oranges."
  - "Alternatively, use conditional aggregation: SUM(CASE WHEN fruit = 'apples' THEN sold_num ELSE -sold_num END)."
starter_code: |
  SELECT
    -- your query here
  FROM leetcode.lc1578_sales
order_matters: true
solution: |
  SELECT
    s1.sale_date,
    s1.sold_num - s2.sold_num AS diff
  FROM leetcode.lc1578_sales s1
  JOIN leetcode.lc1578_sales s2
    ON s1.sale_date = s2.sale_date
    AND s1.fruit = 'apples'
    AND s2.fruit = 'oranges'
  ORDER BY s1.sale_date;
expected_columns: [sale_date, diff]
