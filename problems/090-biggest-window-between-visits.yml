slug: biggest-window-between-visits
title: "Biggest Window Between Visits"
difficulty: medium
category: window-functions
tags: [lag, date-arithmetic, window-functions]
domain: lc1852
tables: [user_visits]
description: |
  Given a table of user visits with `user_id` and `visit_date`, find the largest gap (in days) between consecutive visits for each user.

  Assume today's date is `'2021-01-01'`. The gap from the user's last visit to this date should also be considered.

  Return the following columns:
  - `user_id` - the user's ID
  - `biggest_window` - the maximum number of days between any two consecutive visits (including the gap to 2021-01-01)

  Order the result by `user_id` ascending.
hints:
  - "Use the LEAD() window function to find the next visit date for each user, ordered by visit_date."
  - "For the last visit, use COALESCE to substitute '2021-01-01' as the next date."
  - "In PostgreSQL, subtracting two dates gives the number of days as an integer. Find the MAX gap per user."
starter_code: |
  SELECT
    -- your query here
  FROM user_visits
order_matters: true
solution: |
  WITH visit_gaps AS (
    SELECT
      user_id,
      COALESCE(
        LEAD(visit_date) OVER (PARTITION BY user_id ORDER BY visit_date),
        DATE '2021-01-01'
      ) - visit_date AS gap
    FROM user_visits
  )
  SELECT user_id, MAX(gap) AS biggest_window
  FROM visit_gaps
  GROUP BY user_id
  ORDER BY user_id;
expected_columns: [user_id, biggest_window]
