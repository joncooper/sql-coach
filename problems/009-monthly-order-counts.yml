slug: monthly-order-counts
title: "Monthly Order Counts"
difficulty: medium
category: aggregation
tags: [aggregation, date-grouping, having]
domain: ecommerce
tables: [orders]
description: |
  Count the number of orders placed **each month**. A month is identified by its first calendar day.

  Only include months that have **3 or more** orders.

  Return the following columns:
  - `month` - the first day of each month (a DATE)
  - `order_count` - the number of orders in that month

  Order the results by `month` in **ascending** order.
hints:
  - "You need to group rows that fall in the same month, then count them. The challenge: two orders on `2024-01-03` and `2024-01-27` should end up in the same group. Think about how to collapse a specific date down to the month it belongs to."
  - "Postgres has a dedicated function for truncating a timestamp/date to the start of a broader unit (month, week, quarter, etc). Look up \"date truncation\" in the Postgres docs. Once you have a per-row month value, you can GROUP BY it."
  - "`DATE_TRUNC('month', order_date)` gives the first day of the month for each row. GROUP BY that expression, COUNT(*) inside the SELECT, and filter the group with `HAVING COUNT(*) >= 3`."
order_matters: true
solution: |
  SELECT
    DATE_TRUNC('month', order_date) AS month,
    COUNT(*) AS order_count
  FROM orders
  GROUP BY DATE_TRUNC('month', order_date)
  HAVING COUNT(*) >= 3
  ORDER BY month;
expected_columns: [month, order_count]
