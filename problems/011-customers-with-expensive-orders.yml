slug: customers-with-expensive-orders
title: "Customers With Expensive Orders"
difficulty: medium
category: subqueries
tags: [exists, correlated-subquery, filtering]
domain: ecommerce
tables: [customers, orders]
description: |
  Find customers who have placed **at least one** order with a `total_amount` greater than $1,000.

  Use the `EXISTS` operator with a correlated subquery.

  Return the following columns:
  - `name` - the customer's name
  - `email` - the customer's email address

  Order the results by `name` in **ascending** order.
hints:
  - "EXISTS returns true if the subquery returns at least one row."
  - "In the subquery, correlate it by matching orders.customer_id = customers.id."
  - "Add the total_amount > 1000 condition inside the subquery's WHERE clause."
starter_code: |
  SELECT
    c.name,
    c.email
  FROM customers c
  WHERE EXISTS (
    -- your subquery here
  )
order_matters: true
solution: |
  SELECT
    c.name,
    c.email
  FROM customers c
  WHERE EXISTS (
    SELECT 1
    FROM orders o
    WHERE o.customer_id = c.id
      AND o.total_amount > 1000
  )
  ORDER BY c.name;
expected_columns: [name, email]
