slug: most-recent-product-orders
title: "The Most Recent Orders for Each Product"
difficulty: medium
category: window-functions
tags: [rank, partition-by, joins]
domain: leetcode
tables: [leetcode.lc1688_customers, leetcode.lc1688_orders, leetcode.lc1688_products]
description: |
  Given tables of customers, orders, and products, find the most recent order(s) for each product. If a product has multiple orders on its most recent date, return all of them. Products that have never been ordered should not appear in the result.

  Return the following columns:
  - `product_name` - the name of the product
  - `product_id` - the product's ID
  - `order_id` - the order ID
  - `order_date` - the date of the order

  Order the result by `product_name` ascending, then by `product_id` ascending, then by `order_id` ascending.
hints:
  - "Use RANK() to find the most recent order date for each product."
  - "Partition by product_id and order by order_date DESC so rank 1 represents the most recent date."
  - "Filter where rank = 1. Multiple orders on the same most recent date will all have rank 1."
starter_code: |
  SELECT
    -- your query here
  FROM leetcode.lc1688_orders
order_matters: true
solution: |
  WITH ranked AS (
    SELECT
      o.order_id,
      o.order_date,
      o.product_id,
      p.product_name,
      RANK() OVER (PARTITION BY o.product_id ORDER BY o.order_date DESC) AS rn
    FROM leetcode.lc1688_orders o
    LEFT JOIN leetcode.lc1688_products p ON o.product_id = p.product_id
  )
  SELECT product_name, product_id, order_id, order_date
  FROM ranked
  WHERE rn = 1
  ORDER BY product_name, product_id, order_id;
expected_columns: [product_name, product_id, order_id, order_date]
