slug: string-agg-employee-list
title: "Comma-Separated Employee List per Department"
difficulty: easy
category: string-functions
tags: [string-agg, aggregation, joins, ordering]
domain: hr
tables: [hr.departments, hr.employees]
description: |
  For each department, create a **comma-separated list** of employee names, sorted alphabetically within each department.

  Use `STRING_AGG` with an `ORDER BY` clause inside the aggregate to ensure consistent ordering.

  Return the following columns in this exact order:
  - `department_name` - the department name
  - `employee_list` - comma-separated employee names, sorted alphabetically (e.g. 'Alice, Bob, Charlie')

  Order the results by `department_name` ascending.
hints:
  - "Use STRING_AGG(e.name, ', ' ORDER BY e.name) to create a sorted comma-separated list."
  - "Join hr.departments to hr.employees on department_id."
  - "GROUP BY department name."
starter_code: |
  SELECT
    d.name AS department_name,
    -- create comma-separated list
  FROM hr.departments d
  JOIN hr.employees e ON e.department_id = d.id
  GROUP BY d.name
  ORDER BY department_name
order_matters: true
solution: |
  SELECT
    d.name AS department_name,
    STRING_AGG(e.name, ', ' ORDER BY e.name) AS employee_list
  FROM hr.departments d
  JOIN hr.employees e ON e.department_id = d.id
  GROUP BY d.name
  ORDER BY department_name ASC;
expected_columns: [department_name, employee_list]
