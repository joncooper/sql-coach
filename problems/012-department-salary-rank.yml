slug: department-salary-rank
title: "Salary Rank Within Department"
difficulty: medium
category: window-functions
tags: [window-functions, ranking, partitioning]
domain: hr
tables: [employees, departments]
description: |
  For every employee, compute their salary rank **within their own department**. Employees with the same salary should receive the same rank, and the rank sequence should not have gaps — so if two employees tie for rank 1, the next distinct salary is rank 2, not rank 3.

  Rank 1 is the **highest** salary in the department.

  Return the following columns:
  - `department_name` - the name of the department
  - `employee_name` - the employee's name
  - `salary` - the employee's salary
  - `salary_rank` - the employee's salary rank within their department

  Order the results by `department_name` ascending, then by `salary_rank` ascending.
hints:
  - "You want a per-row rank that restarts inside each group. Think about the class of Postgres features that compute per-row values over a sliding set of rows — there are several that produce ranks, and they differ in how they handle ties."
  - "Postgres has three ranking functions that differ in tie-breaking. One skips numbers after ties, one doesn't, and one assigns strictly sequential numbers. The problem's requirement (\"should not skip numbers\") tells you which one to pick."
  - "`DENSE_RANK() OVER (PARTITION BY department ORDER BY salary DESC)` does what you want. The PARTITION BY restarts the count per department, ORDER BY DESC puts the highest salary at rank 1, and DENSE_RANK handles ties without gaps."
order_matters: true
solution: |
  SELECT
    d.name AS department_name,
    e.name AS employee_name,
    e.salary,
    DENSE_RANK() OVER (PARTITION BY d.name ORDER BY e.salary DESC) AS salary_rank
  FROM employees e
  JOIN departments d ON e.department_id = d.id
  ORDER BY department_name, salary_rank;
expected_columns: [department_name, employee_name, salary, salary_rank]
