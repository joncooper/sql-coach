slug: gaps-in-order-dates
title: "Gaps in Order Dates"
difficulty: hard
category: gaps-and-islands
tags: [generate-series, gaps-and-islands, date-arithmetic, cte]
domain: ecommerce
tables: [orders]
description: |
  Find gaps in daily order activity -- date ranges where **no orders were placed**.

  Use `generate_series` to create a date spine from the first to the last order date in the `orders` table, then identify contiguous ranges of dates with no orders. This is a classic **gaps-and-islands** problem.

  Return the following columns in this exact order:
  - `gap_start` - the first date in the gap (DATE)
  - `gap_end` - the last date in the gap (DATE)
  - `gap_days` - the number of days in the gap (integer, inclusive of both endpoints)

  Order the results by `gap_start` ascending.
hints:
  - "Use generate_series((SELECT MIN(order_date) FROM orders), (SELECT MAX(order_date) FROM orders), '1 day'::interval) to build a complete date spine."
  - "LEFT JOIN or use NOT EXISTS to find dates with no orders."
  - "To group consecutive no-order dates into ranges, subtract a ROW_NUMBER() sequence from each date -- consecutive dates will produce the same value, forming islands."
  - "GROUP BY the island identifier, then take MIN(date) as gap_start and MAX(date) as gap_end."
starter_code: |
  -- Find gaps in daily order activity
  WITH date_spine AS (
    SELECT generate_series(
      -- fill in min and max order dates
    )::date AS d
  ),
  no_order_dates AS (
    -- find dates with no orders
  )
  SELECT
    gap_start,
    gap_end,
    gap_days
  FROM ...
  ORDER BY gap_start;
order_matters: true
solution: |
  WITH date_spine AS (
    SELECT generate_series(
      (SELECT MIN(order_date) FROM orders),
      (SELECT MAX(order_date) FROM orders),
      '1 day'::interval
    )::date AS d
  ),
  no_order_dates AS (
    SELECT ds.d
    FROM date_spine ds
    LEFT JOIN orders o ON o.order_date = ds.d
    WHERE o.id IS NULL
  ),
  grouped AS (
    SELECT
      d,
      d - (ROW_NUMBER() OVER (ORDER BY d))::int AS grp
    FROM no_order_dates
  )
  SELECT
    MIN(d) AS gap_start,
    MAX(d) AS gap_end,
    (MAX(d) - MIN(d) + 1) AS gap_days
  FROM grouped
  GROUP BY grp
  ORDER BY gap_start;
expected_columns: [gap_start, gap_end, gap_days]
