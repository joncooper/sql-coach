slug: gaps-in-order-dates
title: "Gaps in Order Activity"
difficulty: hard
category: gaps-and-islands
tags: [gaps-and-islands, date-arithmetic]
domain: ecommerce
tables: [orders]
description: |
  Find **quiet stretches** in the order activity — contiguous date ranges, between the first order and the last order in the table, where **no orders were placed**.

  For each gap, return its start date, end date, and the number of days it spans (inclusive of both endpoints). A single day with no orders counts as a 1-day gap with `gap_start` = `gap_end`.

  Return the following columns in this exact order:
  - `gap_start` - the first date in the gap (DATE)
  - `gap_end` - the last date in the gap (DATE)
  - `gap_days` - the number of days in the gap (integer, inclusive of both endpoints)

  Order the results by `gap_start` ascending.
hints:
  - "The `orders` table doesn't contain rows for quiet days — so you can't find the gaps by looking at `orders` alone. You'll need a way to enumerate every date from the first order to the last one, then see which of those dates have no corresponding order row."
  - "Once you have a list of dates-with-no-orders, you need to collapse *consecutive* dates into single ranges. There's a well-known SQL trick for this: if you subtract a per-row sequence number from each date, consecutive dates collapse onto the same constant, and you can GROUP BY that constant to get the ranges. Look up \"gaps and islands\" in SQL."
  - "Use `generate_series(MIN(order_date), MAX(order_date), '1 day'::interval)` for the date universe, LEFT JOIN `orders` and keep the NULLs, then assign `ROW_NUMBER() OVER (ORDER BY d)` and subtract it from the date to form island groups. GROUP BY the island and take MIN/MAX for the range bounds."
order_matters: true
solution: |
  WITH date_spine AS (
    SELECT generate_series(
      (SELECT MIN(order_date) FROM orders),
      (SELECT MAX(order_date) FROM orders),
      '1 day'::interval
    )::date AS d
  ),
  no_order_dates AS (
    SELECT ds.d
    FROM date_spine ds
    LEFT JOIN orders o ON o.order_date = ds.d
    WHERE o.id IS NULL
  ),
  grouped AS (
    SELECT
      d,
      d - (ROW_NUMBER() OVER (ORDER BY d))::int AS grp
    FROM no_order_dates
  )
  SELECT
    MIN(d) AS gap_start,
    MAX(d) AS gap_end,
    (MAX(d) - MIN(d) + 1) AS gap_days
  FROM grouped
  GROUP BY grp
  ORDER BY gap_start;
expected_columns: [gap_start, gap_end, gap_days]
