slug: seven-day-rolling-avg
title: "7-Day Rolling Average Revenue"
difficulty: hard
category: window-functions
tags: [window-functions, rolling-average, aggregation]
domain: ecommerce
tables: [orders]
description: |
  Report a **7-day rolling average** of daily completed-order revenue. For each day that has at least one completed order, return both the day's own revenue and the rolling average of the current day plus the previous 6 days.

  Only include days that have at least one completed order — you do not need to backfill zero-revenue days. On the earliest days, where there aren't 6 prior days of data yet, the rolling average should be over however many days are available (no special casing required).

  Return the following columns in this exact order:
  - `order_date` - the date (DATE)
  - `daily_revenue` - total revenue for that day from completed orders
  - `rolling_7d_avg` - the 7-day rolling average, rounded to **2 decimal places**

  Order the results by `order_date` ascending.
hints:
  - "Two steps: first, collapse orders to one row per day with the day's total revenue (a plain GROUP BY). Then, for each of those day-rows, compute an average across a moving window of recent days."
  - "Postgres window functions accept more than just `OVER (PARTITION BY ... ORDER BY ...)` — there's a clause that lets you specify *which rows* go into the window for each row. Look up the window `ROWS BETWEEN ...` frame clause."
  - "Stage daily revenue in a CTE, then apply `AVG(daily_revenue) OVER (ORDER BY order_date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)`. Round to 2 decimals via `::numeric` cast."
order_matters: true
solution: |
  WITH daily_rev AS (
    SELECT
      order_date,
      SUM(total_amount) AS daily_revenue
    FROM orders
    WHERE status = 'completed'
    GROUP BY order_date
  )
  SELECT
    order_date,
    daily_revenue,
    ROUND(
      AVG(daily_revenue) OVER (ORDER BY order_date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)::numeric,
      2
    ) AS rolling_7d_avg
  FROM daily_rev
  ORDER BY order_date;
expected_columns: [order_date, daily_revenue, rolling_7d_avg]
