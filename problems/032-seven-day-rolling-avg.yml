slug: seven-day-rolling-avg
title: "7-Day Rolling Average Revenue"
difficulty: hard
category: window-functions
tags: [window-functions, rolling-average, aggregation, date-functions]
domain: ecommerce
tables: [orders]
description: |
  Calculate a **7-day rolling average** of daily completed order revenue.

  First, compute the total revenue (sum of `total_amount`) for each day that has at least one **completed** order. Then, apply a window function to compute the rolling 7-day average over those days.

  Use the window frame `ROWS BETWEEN 6 PRECEDING AND CURRENT ROW` to include the current day plus the 6 preceding rows.

  Only include days that have at least one completed order (no need to fill in missing days).

  Return the following columns in this exact order:
  - `order_date` - the date (DATE)
  - `daily_revenue` - total revenue for that day from completed orders
  - `rolling_7d_avg` - the 7-day rolling average, rounded to **2 decimal places**

  Order the results by `order_date` ascending.
hints:
  - "Start with a CTE that groups completed orders by order_date to get daily_revenue."
  - "Use AVG(daily_revenue) OVER (ORDER BY order_date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW) for the rolling average."
  - "ROUND(..., 2) to get 2 decimal places."
  - "The first few rows will have fewer than 7 days of data — that's expected."
starter_code: |
  WITH daily_rev AS (
    SELECT
      order_date,
      SUM(total_amount) AS daily_revenue
    FROM orders
    WHERE status = 'completed'
    GROUP BY order_date
  )
  SELECT
    order_date,
    daily_revenue,
    -- calculate rolling 7-day average
  FROM daily_rev
  ORDER BY order_date
order_matters: true
solution: |
  WITH daily_rev AS (
    SELECT
      order_date,
      SUM(total_amount) AS daily_revenue
    FROM orders
    WHERE status = 'completed'
    GROUP BY order_date
  )
  SELECT
    order_date,
    daily_revenue,
    ROUND(
      AVG(daily_revenue) OVER (ORDER BY order_date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)::numeric,
      2
    ) AS rolling_7d_avg
  FROM daily_rev
  ORDER BY order_date;
expected_columns: [order_date, daily_revenue, rolling_7d_avg]
