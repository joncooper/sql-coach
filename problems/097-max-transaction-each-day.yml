slug: max-transaction-each-day
title: "Maximum Transaction Each Day"
difficulty: medium
category: window-functions
tags: [window-functions, top-per-group]
domain: lc1981
tables: [transactions]
description: |
  You are given a **Transactions** table with columns `transaction_id`, `day` (a timestamp), and `amount`.

  Find the **transactions with the maximum amount on each day**. If multiple transactions tie for the maximum on a given day, return all of them.

  Return the following column:
  - `transaction_id` - the transaction identifier

  Order the result by `transaction_id` in **ascending** order.
hints:
  - "Two things to figure out: (1) how to group by the *date* portion of a timestamp (not the full timestamp — otherwise transactions a second apart go into different groups), and (2) how to find the max-amount row per date with ties preserved."
  - "For the timestamp: Postgres lets you cast to `date` with `::date` or use `DATE_TRUNC('day', ...)`. For the top-per-group with ties: per-row positional window functions, partitioned by the per-day key, ordered by amount descending. Pick one that gives the same value to tied rows so you keep all winners."
  - "`RANK() OVER (PARTITION BY day::date ORDER BY amount DESC)` in a CTE, then filter `WHERE rn = 1` in the outer query."
order_matters: true
solution: |
  WITH ranked AS (
    SELECT
      transaction_id,
      RANK() OVER (PARTITION BY day::date ORDER BY amount DESC) AS rn
    FROM transactions
  )
  SELECT transaction_id
  FROM ranked
  WHERE rn = 1
  ORDER BY transaction_id;
expected_columns: [transaction_id]
