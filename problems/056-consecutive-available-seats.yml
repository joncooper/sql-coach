slug: consecutive-available-seats
title: "Consecutive Available Seats"
difficulty: easy
category: window-functions
tags: [window-functions, consecutive]
domain: lc603
tables: [cinema]
description: |
  Find all cinema seats that are part of a run of **two or more consecutive free seats**.

  Two seats are "consecutive" if their `seat_id` values differ by exactly 1 and both are free. A seat qualifies for the output if at least one of its immediate neighbors (either side) is also free.

  Return the following column:
  - `seat_id` - the ID of each seat that is part of a consecutive free group

  Order the results by `seat_id` in **ascending** order.
hints:
  - "For each free seat, you need to check whether the free-seat immediately before it (one lower `seat_id`) or immediately after it (one higher) exists. Think about how to look at a neighboring row from within a single query."
  - "Postgres window functions can peek at the previous and next row within an ordered set. Paired with `ORDER BY seat_id`, one of them gives you the prior row's seat_id, another gives you the next row's — compare those to the current seat."
  - "Filter `cinema` to `free = true`, then use `LAG(seat_id) OVER (ORDER BY seat_id)` and `LEAD(seat_id) OVER (ORDER BY seat_id)`. Keep rows where the previous free seat is 1 lower OR the next free seat is 1 higher."
order_matters: true
solution: |
  SELECT seat_id
  FROM (
    SELECT
      seat_id,
      CASE WHEN seat_id - LAG(seat_id) OVER (ORDER BY seat_id) = 1 THEN 1 ELSE 0 END AS has_prev,
      CASE WHEN LEAD(seat_id) OVER (ORDER BY seat_id) - seat_id = 1 THEN 1 ELSE 0 END AS has_next
    FROM cinema
    WHERE free = true
  ) s
  WHERE has_prev = 1 OR has_next = 1
  ORDER BY seat_id;
expected_columns: [seat_id]
