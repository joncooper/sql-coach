slug: actors-directors-cooperation
title: "Actors and Directors Who Cooperated at Least Three Times"
difficulty: easy
category: aggregation
tags: [group-by, having, count]
domain: leetcode
tables: [leetcode.lc1136_actor_director]
description: |
  Write a query to find all (actor_id, director_id) pairs where the actor has cooperated with the director at least three times.

  Return the following columns in this exact order:
  - `actor_id` - the ID of the actor
  - `director_id` - the ID of the director

  Return the result in **any order**.
hints:
  - "GROUP BY both actor_id and director_id to count cooperations per pair."
  - "Use HAVING with COUNT(*) to filter for pairs with 3 or more cooperations."
  - "No joins are needed — all the data is in one table."
starter_code: |
  SELECT
    -- your query here
  FROM leetcode.lc1136_actor_director
order_matters: false
solution: |
  SELECT actor_id, director_id
  FROM leetcode.lc1136_actor_director
  GROUP BY actor_id, director_id
  HAVING COUNT(*) >= 3;
expected_columns: [actor_id, director_id]
