slug: order-status-pivot
title: "Order Status Breakdown per Customer"
difficulty: medium
category: conditional-logic
tags: [conditional-logic, aggregation, pivot]
domain: ecommerce
tables: [customers, orders]
description: |
  For each customer, report **how many orders they have in each status** — as separate columns, not separate rows. The output should be one row per customer with four count columns, one per status.

  Return the following columns in this exact order:
  - `customer_name` - the customer's name
  - `completed_count` - number of completed orders
  - `pending_count` - number of pending orders
  - `cancelled_count` - number of cancelled orders
  - `refunded_count` - number of refunded orders

  Every customer who has at least one order should appear. Order the results by `completed_count` in **descending** order, then by `customer_name` ascending.
hints:
  - "A plain `GROUP BY customer, status` gives you one row per (customer, status) pair — not what you want. You need to pivot: one row per customer, with each status as a different column."
  - "Postgres doesn't have a PIVOT keyword. The standard idiom for \"count rows matching condition X\" inside an aggregate is a conditional expression *inside* the aggregate function: the aggregate sees 1 when the row matches and 0 (or NULL) otherwise. That way each output column is a different conditional aggregation."
  - "`SUM(CASE WHEN o.status = 'completed' THEN 1 ELSE 0 END) AS completed_count`, repeated for each status. Group by customer and you're done."
order_matters: true
solution: |
  SELECT
    c.name AS customer_name,
    SUM(CASE WHEN o.status = 'completed' THEN 1 ELSE 0 END) AS completed_count,
    SUM(CASE WHEN o.status = 'pending' THEN 1 ELSE 0 END) AS pending_count,
    SUM(CASE WHEN o.status = 'cancelled' THEN 1 ELSE 0 END) AS cancelled_count,
    SUM(CASE WHEN o.status = 'refunded' THEN 1 ELSE 0 END) AS refunded_count
  FROM customers c
  JOIN orders o ON o.customer_id = c.id
  GROUP BY c.name
  ORDER BY completed_count DESC, customer_name ASC;
expected_columns: [customer_name, completed_count, pending_count, cancelled_count, refunded_count]
