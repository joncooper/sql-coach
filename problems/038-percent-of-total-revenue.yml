slug: percent-of-total-revenue
title: "Customer Percent of Total Revenue"
difficulty: medium
category: aggregations
tags: [aggregation, window-functions, percentage, joins]
domain: ecommerce
tables: [ecommerce.customers, ecommerce.orders]
description: |
  Calculate each customer's share of total **completed** order revenue.

  Compute each customer's total revenue from completed orders, then compare it to the overall total revenue across all completed orders to get a percentage.

  Only include customers who have at least one completed order.

  Return the following columns in this exact order:
  - `customer_name` - the customer's name
  - `customer_revenue` - total revenue from that customer's completed orders
  - `total_revenue` - the overall total revenue from all completed orders (same value in every row)
  - `revenue_pct` - the customer's share of total revenue, rounded to **1 decimal place**

  Order the results by `revenue_pct` descending.
hints:
  - "Aggregate completed orders per customer to get customer_revenue."
  - "Use SUM(customer_revenue) OVER () as a window function to get total_revenue across all rows."
  - "Divide customer_revenue by total_revenue * 100 and ROUND to 1 decimal."
starter_code: |
  SELECT
    c.name AS customer_name,
    SUM(o.total_amount) AS customer_revenue,
    -- calculate total_revenue
    -- calculate revenue_pct
  FROM ecommerce.orders o
  JOIN ecommerce.customers c ON c.id = o.customer_id
  WHERE o.status = 'completed'
  GROUP BY c.name
  ORDER BY revenue_pct DESC
order_matters: true
solution: |
  WITH customer_rev AS (
    SELECT
      c.name AS customer_name,
      SUM(o.total_amount) AS customer_revenue
    FROM ecommerce.orders o
    JOIN ecommerce.customers c ON c.id = o.customer_id
    WHERE o.status = 'completed'
    GROUP BY c.name
  )
  SELECT
    customer_name,
    customer_revenue,
    SUM(customer_revenue) OVER () AS total_revenue,
    ROUND((customer_revenue * 100.0 / SUM(customer_revenue) OVER ())::numeric, 1) AS revenue_pct
  FROM customer_rev
  ORDER BY revenue_pct DESC;
expected_columns: [customer_name, customer_revenue, total_revenue, revenue_pct]
