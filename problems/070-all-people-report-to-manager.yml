slug: all-people-report-to-manager
title: "All People Report to the Given Manager"
difficulty: medium
category: joins
tags: [self-join, hierarchical]
domain: leetcode
tables: [leetcode.lc1405_employees]
description: |
  You are given an **Employees** table where each employee has a manager. The head of the company has `employee_id = 1` and reports to themselves (`manager_id = 1`).

  Write a query to find the `employee_id` of all employees who directly or indirectly report to the head of the company (employee 1).

  The indirect reporting chain will **not exceed three managers** (the company is small).

  Do **not** include the head of the company (employee 1) in the result.

  Return the following column:
  - `employee_id` - employees who report to the head (directly or indirectly)

  Return the result in **any order**.
hints:
  - "An employee reports to the head if following their manager chain leads to employee 1 within 3 hops."
  - "Use self-joins: join Employees to itself to walk up the manager chain. Three LEFT JOINs can reach up to 3 levels of management."
  - "Join e1.manager_id = e2.employee_id, then e2.manager_id = e3.employee_id. If e3.manager_id = 1, the original employee reports to the head."
starter_code: |
  SELECT
    -- your query here
  FROM leetcode.lc1405_employees
order_matters: false
solution: |
  SELECT e1.employee_id
  FROM leetcode.lc1405_employees e1
  JOIN leetcode.lc1405_employees e2
    ON e1.manager_id = e2.employee_id
  JOIN leetcode.lc1405_employees e3
    ON e2.manager_id = e3.employee_id
  WHERE e1.employee_id <> 1
    AND e3.manager_id = 1;
expected_columns: [employee_id]
