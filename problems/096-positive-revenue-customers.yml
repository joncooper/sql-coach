slug: positive-revenue-customers
title: "Find Customers With Positive Revenue This Year"
difficulty: easy
category: basic-select
tags: [where, filtering, basics]
domain: lc1974
tables: [customers]
description: |
  You are given a **Customers** table containing `customer_id`, `year`, and `revenue` for each customer across different years. Note that revenue can be negative.

  Write a query to find all customers who had **positive revenue** in the year **2021**.

  Return the following column:
  - `customer_id` - the customer identifier

  Return the result in **any order**.
hints:
  - "You need two conditions: filter for the year 2021 AND revenue greater than zero."
  - "A simple WHERE clause with both conditions is all you need."
  - "Remember that revenue can be negative or zero -- only include strictly positive values."
order_matters: false
solution: |
  SELECT customer_id
  FROM customers
  WHERE year = 2021
    AND revenue > 0;
expected_columns: [customer_id]
