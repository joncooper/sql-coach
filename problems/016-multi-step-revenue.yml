slug: multi-step-revenue
title: "Multi-Step Revenue Analysis with CTEs"
difficulty: hard
category: ctes
tags: [cte, aggregation, ranking, window-functions]
domain: ecommerce
tables: [customers, orders]
description: |
  Use Common Table Expressions (CTEs) to perform a multi-step revenue analysis.

  Your query should follow these steps:
  1. In a CTE called `customer_totals`, calculate each customer's total spend from **completed** orders only.
  2. In a CTE called `ranked_customers`, rank customers by their total spend using `RANK()` in descending order.
  3. In the final SELECT, return the **top 5** customers by spend rank.

  Return the following columns in this exact order:
  - `customer_name` - the customer's name
  - `total_spent` - the sum of total_amount for completed orders
  - `spend_rank` - the rank based on total_spent (highest first)

  Order the results by `spend_rank` ascending.
hints:
  - "Use WITH ... AS to define each CTE step."
  - "Filter orders with WHERE status = 'completed' in the first CTE."
  - "Use RANK() OVER (ORDER BY total_spent DESC) to rank customers."
starter_code: |
  WITH customer_totals AS (
    -- Step 1: total spend per customer (completed orders only)
  ),
  ranked_customers AS (
    -- Step 2: rank customers by total spend
  )
  -- Step 3: select top 5
  SELECT
    customer_name,
    total_spent,
    spend_rank
  FROM ranked_customers
order_matters: true
solution: |
  WITH customer_totals AS (
    SELECT
      c.name AS customer_name,
      SUM(o.total_amount) AS total_spent
    FROM customers c
    JOIN orders o ON o.customer_id = c.id
    WHERE o.status = 'completed'
    GROUP BY c.name
  ),
  ranked_customers AS (
    SELECT
      customer_name,
      total_spent,
      RANK() OVER (ORDER BY total_spent DESC) AS spend_rank
    FROM customer_totals
  )
  SELECT
    customer_name,
    total_spent,
    spend_rank
  FROM ranked_customers
  WHERE spend_rank <= 5
  ORDER BY spend_rank;
expected_columns: [customer_name, total_spent, spend_rank]
