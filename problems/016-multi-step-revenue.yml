slug: multi-step-revenue
title: "Top 5 Customers by Completed Order Revenue"
difficulty: hard
category: ctes
tags: [ctes, aggregation, ranking]
domain: ecommerce
tables: [customers, orders]
description: |
  Find the **top 5 customers** ranked by their total spend on **completed** orders.

  Total spend is the sum of `total_amount` across a customer's completed orders. Ties in total spend should share the same rank (so if two customers are tied for 1st, they both show rank 1 and the next customer is rank 3).

  Return the following columns in this exact order:
  - `customer_name` - the customer's name
  - `total_spent` - the sum of `total_amount` for that customer's completed orders
  - `spend_rank` - the rank based on `total_spent` (highest first; ties share a rank)

  Only customers whose rank is 5 or lower should appear. Order the results by `spend_rank` ascending.
hints:
  - "You need to do this in two logical steps: (1) aggregate each customer's completed-order spend, then (2) rank those aggregates and keep the top 5. A flat query can't easily do both because aggregation collapses rows before you can rank them."
  - "Staging multi-step logic like this is exactly what CTEs are for. Build one CTE that groups orders to get per-customer totals, then a second CTE (or the final SELECT) that adds a per-row rank over those totals and filters to the top 5. Note: because of ties, using the wrong ranking function (e.g. one that skips numbers after ties) can affect whether you return exactly 5 or more."
  - "`WITH customer_totals AS (SELECT c.name, SUM(o.total_amount) ... GROUP BY c.name)`, then add `RANK() OVER (ORDER BY total_spent DESC)` in a second CTE, then filter `WHERE spend_rank <= 5` in the outer query."
order_matters: true
solution: |
  WITH customer_totals AS (
    SELECT
      c.name AS customer_name,
      SUM(o.total_amount) AS total_spent
    FROM customers c
    JOIN orders o ON o.customer_id = c.id
    WHERE o.status = 'completed'
    GROUP BY c.name
  ),
  ranked_customers AS (
    SELECT
      customer_name,
      total_spent,
      RANK() OVER (ORDER BY total_spent DESC) AS spend_rank
    FROM customer_totals
  )
  SELECT
    customer_name,
    total_spent,
    spend_rank
  FROM ranked_customers
  WHERE spend_rank <= 5
  ORDER BY spend_rank;
expected_columns: [customer_name, total_spent, spend_rank]
