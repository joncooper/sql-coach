slug: find-team-size
title: "Find the Team Size"
difficulty: easy
category: aggregation
tags: [count, joins, subquery]
domain: lc1438
tables: [employee]
description: |
  You have a table of employees where each employee belongs to a team. Write a query to find the team size for each employee.

  Return the following columns in this exact order:
  - `employee_id` - the employee's ID
  - `team_size` - the total number of employees on that employee's team

  Return the result in **any order**.
hints:
  - "You need to count how many employees share the same team_id."
  - "Consider using a subquery or CTE to first calculate the count per team, then join it back to the employee table."
  - "Alternatively, you can use a window function: COUNT(*) OVER (PARTITION BY team_id)."
order_matters: false
solution: |
  WITH team_counts AS (
    SELECT
      team_id,
      COUNT(*) AS team_size
    FROM employee
    GROUP BY team_id
  )
  SELECT
    e.employee_id,
    tc.team_size
  FROM employee e
  JOIN team_counts tc
    ON e.team_id = tc.team_id;
expected_columns: [employee_id, team_size]
