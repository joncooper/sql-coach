slug: salary-above-dept-avg
title: "Employees Above Department Average Salary"
difficulty: medium
category: subqueries
tags: [subqueries, aggregation, comparison]
domain: hr
tables: [employees, departments]
description: |
  Find employees whose salary is **strictly above** their own department's average salary. Each employee should be compared only against their own department.

  Return the following columns in this exact order:
  - `name` - the employee's name
  - `department_name` - the department name
  - `salary` - the employee's salary
  - `dept_avg_salary` - the department's average salary, rounded to **0 decimal places**

  Order the results by `salary` in **descending** order.
hints:
  - "You need the department's average next to each employee's row so you can compare them. A plain `GROUP BY department` collapses the rows and loses the individual salaries — not what you want."
  - "Two idiomatic ways: (a) compute per-department averages in a subquery/CTE and JOIN back to the employee rows, or (b) use a per-row window function that carries the department average alongside every employee without collapsing."
  - "The per-row window approach: `AVG(salary) OVER (PARTITION BY department_id)` inside a subquery, then filter the outer query where `salary > dept_avg`. Wrap the AVG in `ROUND(..., 0)` for the display column."
order_matters: true
solution: |
  SELECT
    name,
    department_name,
    salary,
    dept_avg_salary
  FROM (
    SELECT
      e.name,
      d.name AS department_name,
      e.salary,
      ROUND(AVG(e.salary) OVER (PARTITION BY e.department_id))::numeric AS dept_avg_salary
    FROM employees e
    JOIN departments d ON d.id = e.department_id
  ) sub
  WHERE salary > dept_avg_salary
  ORDER BY salary DESC;
expected_columns: [name, department_name, salary, dept_avg_salary]
