slug: revenue-pareto
title: "Revenue Pareto Analysis"
difficulty: hard
category: business-analysis
tags: [business-analysis, cumulative, ranking]
domain: ecommerce
tables: [customers, orders]
description: |
  Perform a **Pareto analysis** on customer revenue: for each customer, show both the revenue they contributed and the **cumulative share of total revenue** captured by all customers ranked at or above them.

  Only include orders with status = `'completed'`. Rank customers from highest revenue to lowest. The cumulative percentage at the top customer should be roughly equal to that customer's share of the total; at the last customer it should be 100.0%.

  Return the following columns in this exact order:
  - `customer_name` - the customer's name
  - `customer_revenue` - that customer's total completed-order revenue
  - `cumulative_revenue` - the running total of revenue when customers are ordered from highest to lowest
  - `cumulative_pct` - cumulative revenue as a percentage of overall total, rounded to **1 decimal place**

  Order the results by `customer_revenue` descending.
hints:
  - "Two computations you'll need in the same query: (1) each customer's own revenue, (2) a running sum of that revenue ordered from biggest to smallest. Think about how to produce a running sum without collapsing rows — it's not a plain GROUP BY."
  - "Postgres lets aggregate functions run as per-row \"window\" calculations with an `OVER` clause. If you give that clause an `ORDER BY`, the aggregate accumulates as it walks through the rows in that order — exactly what a running total is. If you give it no `ORDER BY` and no `PARTITION BY`, it becomes a grand total on every row."
  - "Stage per-customer revenue in a CTE, then in the outer SELECT use `SUM(customer_revenue) OVER (ORDER BY customer_revenue DESC)` for the running total and `SUM(customer_revenue) OVER ()` for the grand total. Divide and round."
order_matters: true
solution: |
  WITH customer_rev AS (
    SELECT
      c.name AS customer_name,
      SUM(o.total_amount) AS customer_revenue
    FROM customers c
    JOIN orders o ON o.customer_id = c.id
    WHERE o.status = 'completed'
    GROUP BY c.id, c.name
  )
  SELECT
    customer_name,
    customer_revenue,
    SUM(customer_revenue) OVER (ORDER BY customer_revenue DESC) AS cumulative_revenue,
    ROUND(
      (SUM(customer_revenue) OVER (ORDER BY customer_revenue DESC)
      / SUM(customer_revenue) OVER () * 100)::numeric,
      1
    ) AS cumulative_pct
  FROM customer_rev
  ORDER BY customer_revenue DESC;
expected_columns: [customer_name, customer_revenue, cumulative_revenue, cumulative_pct]
