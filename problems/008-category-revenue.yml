slug: category-revenue
title: "Revenue by Product Category"
difficulty: medium
category: aggregations
tags: [group-by, join, having, sum, multi-table]
domain: ecommerce
tables: [ecommerce.categories, ecommerce.products, ecommerce.order_items, ecommerce.orders]
description: |
  Calculate the total revenue for each product category, considering only **completed** orders.

  Revenue is calculated from the `order_items` table as `quantity * unit_price` for each item.

  Return the following columns:
  - `category_name` - the name of the product category
  - `total_revenue` - the sum of revenue for that category

  Only include categories where `total_revenue` is greater than $500.

  Order the results by `total_revenue` in **descending** order.
hints:
  - "You need to join four tables: categories, products, order_items, and orders."
  - "Filter orders by status = 'completed' in the WHERE clause."
  - "Use SUM(oi.quantity * oi.unit_price) to calculate total revenue."
  - "Use HAVING to filter groups after aggregation (for the > 500 condition)."
starter_code: |
  SELECT
    -- your query here
  FROM ecommerce.categories c
  JOIN ecommerce.products p ON ...
  JOIN ecommerce.order_items oi ON ...
  JOIN ecommerce.orders o ON ...
  WHERE ...
  GROUP BY ...
  HAVING ...
order_matters: true
solution: |
  SELECT
    c.name AS category_name,
    SUM(oi.quantity * oi.unit_price) AS total_revenue
  FROM ecommerce.categories c
  JOIN ecommerce.products p ON c.id = p.category_id
  JOIN ecommerce.order_items oi ON p.id = oi.product_id
  JOIN ecommerce.orders o ON oi.order_id = o.id
  WHERE o.status = 'completed'
  GROUP BY c.name
  HAVING SUM(oi.quantity * oi.unit_price) > 500
  ORDER BY total_revenue DESC;
expected_columns: [category_name, total_revenue]
