slug: active-users-union
title: "Users Who Visited Dashboard AND Reports"
difficulty: medium
category: set-operations
tags: [intersect, joins, distinct, set-operations]
domain: analytics
tables: [users, sessions, page_views]
description: |
  Find users who visited **both** `/dashboard` and `/reports` within the **same session**.

  A user qualifies if there exists at least one session where they viewed both URLs.

  Return the following columns:
  - `username` - the user's username

  Return **distinct** usernames, ordered **alphabetically**.
hints:
  - "Join users -> sessions -> page_views to connect users to their page views."
  - "One approach: find sessions with /dashboard views, find sessions with /reports views, then INTERSECT."
  - "Another approach: self-join page_views on session_id with different URL filters."
starter_code: |
  -- Find users who visited both /dashboard and /reports in the same session
  SELECT DISTINCT
    username
  FROM users
order_matters: true
solution: |
  SELECT DISTINCT u.username
  FROM users u
  JOIN sessions s ON s.user_id = u.id
  JOIN page_views pv1 ON pv1.session_id = s.id AND pv1.url = '/dashboard'
  JOIN page_views pv2 ON pv2.session_id = s.id AND pv2.url = '/reports'
  ORDER BY u.username;
expected_columns: [username]
