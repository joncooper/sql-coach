slug: tenure-calculation
title: "Employee Tenure Calculation"
difficulty: medium
category: date-functions
tags: [date-functions, casting]
domain: hr
tables: [employees]
description: |
  For each employee, compute their **tenure in complete years** as of the reference date **2024-01-01**.

  "Complete years" means the number of full years elapsed between hire and that date — someone hired on 2020-06-15 has 3 complete years as of 2024-01-01, not 3.5 and not 4.

  Return the following columns in this exact order:
  - `name` - the employee's name
  - `hire_date` - the employee's hire date
  - `tenure_years` - the number of complete years of tenure (as an integer)

  Order the results by `tenure_years` in **descending** order, then by `name` ascending.
hints:
  - "A naive `(ref_date - hire_date) / 365` is close but drifts over leap years and doesn't cleanly give you *calendar* years (anniversaries). Postgres has dedicated date functions for this."
  - "Postgres has a function that returns the difference between two dates as an `interval`, and another that pulls a specific field (years, months, days) out of an interval. Chain them together to get the integer year count."
  - "`EXTRACT(YEAR FROM AGE('2024-01-01'::date, hire_date))::INTEGER`. `AGE` gives a calendar-correct interval; `EXTRACT(YEAR FROM ...)` pulls the year portion as a numeric, and the cast makes it an integer."
order_matters: true
solution: |
  SELECT
    name,
    hire_date,
    EXTRACT(YEAR FROM AGE('2024-01-01'::date, hire_date))::INTEGER AS tenure_years
  FROM employees
  ORDER BY tenure_years DESC, name ASC;
expected_columns: [name, hire_date, tenure_years]
