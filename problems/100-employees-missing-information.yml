slug: employees-missing-information
title: "Employees With Missing Information"
difficulty: easy
category: joins
tags: [union, left-join, null-check]
domain: leetcode
tables: [leetcode.lc2110_employees, leetcode.lc2110_salaries]
description: |
  You are given two tables:

  - **Employees**: contains `employee_id` and `name`.
  - **Salaries**: contains `employee_id` and `salary`.

  An employee has **missing information** if either:
  - Their **name** is missing (they appear in Salaries but not in Employees), or
  - Their **salary** is missing (they appear in Employees but not in Salaries).

  Write a query to report the IDs of all employees with missing information.

  Return the following column:
  - `employee_id` - the employee identifier

  Order the result by `employee_id` in **ascending** order.
hints:
  - "You need to find employee IDs that exist in one table but not the other."
  - "One approach: UNION the IDs from both tables, then LEFT JOIN each table and check for NULLs."
  - "Another approach: use FULL OUTER JOIN between the two tables and filter where either side is NULL."
starter_code: |
  SELECT
    -- your query here
  FROM leetcode.lc2110_employees
order_matters: true
solution: |
  SELECT employee_id
  FROM (
    SELECT e.employee_id
    FROM leetcode.lc2110_employees e
    LEFT JOIN leetcode.lc2110_salaries s
      ON e.employee_id = s.employee_id
    WHERE s.employee_id IS NULL
    UNION
    SELECT s.employee_id
    FROM leetcode.lc2110_salaries s
    LEFT JOIN leetcode.lc2110_employees e
      ON s.employee_id = e.employee_id
    WHERE e.employee_id IS NULL
  ) missing
  ORDER BY employee_id;
expected_columns: [employee_id]
