slug: moving-avg-session-count
title: "3-Day Moving Average of Session Counts"
difficulty: medium
category: window-functions
tags: [window-functions, aggregation]
domain: analytics
tables: [sessions]
description: |
  Calculate a **3-day moving average** of daily session counts.

  First, count the sessions per day (using the date portion of `started_at`). Then, for each day, report a moving average that covers the current day and the **two preceding days** (i.e., a trailing 3-day window).

  On the earliest days — where there aren't 2 prior days of data yet — the moving average should be computed over however many days are actually available. No special casing required.

  Return the following columns in this exact order:
  - `session_date` - the date (DATE, derived from `started_at`)
  - `daily_sessions` - the count of sessions on that date
  - `moving_avg_3d` - the 3-day moving average, rounded to **1 decimal place**

  Order the results by `session_date` ascending.
hints:
  - "Two steps: (1) collapse sessions into one row per day with that day's count, (2) for each day-row, compute an average across a sliding 3-row window that includes the current row and the previous two."
  - "Postgres window functions can take a frame specification — a clause that tells the window which rows to include on each evaluation, relative to the current row. Look up the `ROWS BETWEEN ... PRECEDING AND CURRENT ROW` frame syntax."
  - "Stage daily counts in a CTE, then `AVG(daily_sessions) OVER (ORDER BY session_date ROWS BETWEEN 2 PRECEDING AND CURRENT ROW)` and round to 1 decimal."
order_matters: true
solution: |
  WITH daily_counts AS (
    SELECT
      started_at::date AS session_date,
      COUNT(*) AS daily_sessions
    FROM sessions
    GROUP BY started_at::date
  )
  SELECT
    session_date,
    daily_sessions,
    ROUND(
      AVG(daily_sessions) OVER (ORDER BY session_date ROWS BETWEEN 2 PRECEDING AND CURRENT ROW),
      1
    ) AS moving_avg_3d
  FROM daily_counts
  ORDER BY session_date;
expected_columns: [session_date, daily_sessions, moving_avg_3d]
