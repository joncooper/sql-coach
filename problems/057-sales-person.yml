slug: sales-person
title: "Sales Person"
difficulty: easy
category: subqueries
tags: [not-in, subquery, joins]
domain: lc607
tables: [sales_person, company, orders]
description: |
  Write a query to find the names of all salespersons who did not have any orders related to the company named "RED".

  Return the following column:
  - `name` - the name of the salesperson

  Return the result in **any order**.
hints:
  - "First, find which salespersons have orders with the company 'RED' by joining the orders and company tables."
  - "Use NOT IN or NOT EXISTS to exclude those salespersons from the full salesperson list."
  - "Think about it as: all salespersons EXCEPT those who sold to 'RED'."
order_matters: false
solution: |
  SELECT name
  FROM sales_person
  WHERE sales_id NOT IN (
    SELECT o.sales_id
    FROM orders o
    JOIN company c
      ON o.com_id = c.com_id
    WHERE c.name = 'RED'
  );
expected_columns: [name]
