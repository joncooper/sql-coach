slug: customers-without-orders
title: "Customers Without Orders"
difficulty: medium
category: joins
tags: [left-join, null-check, anti-join]
domain: ecommerce
tables: [ecommerce.customers, ecommerce.orders]
description: |
  Find customers who have **never** placed an order. These are customers that exist in the customers table but have no matching rows in the orders table.

  Return the following columns:
  - `name` - the customer's name
  - `email` - the customer's email address

  Order the results by `name` ascending.
hints:
  - "Use a LEFT JOIN from customers to orders. Rows with no matching order will have NULL values for the orders columns."
  - "After the LEFT JOIN, use WHERE to filter for rows where the order id IS NULL."
  - "An alternative approach uses NOT EXISTS with a correlated subquery."
starter_code: |
  SELECT
    -- your query here
  FROM ecommerce.customers c
  LEFT JOIN ...
order_matters: true
solution: |
  SELECT
    c.name,
    c.email
  FROM ecommerce.customers c
  LEFT JOIN ecommerce.orders o ON c.id = o.customer_id
  WHERE o.id IS NULL
  ORDER BY c.name;
expected_columns: [name, email]
