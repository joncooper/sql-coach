slug: tree-node
title: "Tree Node"
difficulty: medium
category: conditional-logic
tags: [case, self-join, tree]
domain: lc608
tables: [tree]
description: |
  Each node in a binary tree can be one of three types:

  - **Root**: the node has no parent (p_id is NULL)
  - **Inner**: the node has a parent and at least one child
  - **Leaf**: the node has a parent but no children

  Write a query to report the type of each node in the tree.

  Return the following columns in this exact order:
  - `id` - the node ID
  - `type` - one of 'Root', 'Inner', or 'Leaf'

  Order the results by `id` in **ascending** order.
hints:
  - "A Root node has p_id IS NULL."
  - "An Inner node has a parent AND appears as a p_id for at least one other node."
  - "Use a CASE expression. To check if a node has children, see if its id appears in the p_id column using a subquery or self-join."
order_matters: true
solution: |
  SELECT
    id,
    CASE
      WHEN p_id IS NULL THEN 'Root'
      WHEN id IN (SELECT DISTINCT p_id FROM tree WHERE p_id IS NOT NULL) THEN 'Inner'
      ELSE 'Leaf'
    END AS type
  FROM tree
  ORDER BY id;
expected_columns: [id, type]
