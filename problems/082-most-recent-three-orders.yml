slug: most-recent-three-orders
title: "The Most Recent Three Orders"
difficulty: medium
category: window-functions
tags: [window-functions, top-per-group]
domain: lc1671
tables: [customers, orders]
description: |
  Given tables of customers and their orders, find the **most recent three orders** per customer. If a customer has fewer than three orders, return all of their orders.

  Return the following columns:
  - `customer_name` - the customer's name
  - `customer_id` - the customer's ID
  - `order_id` - the order ID
  - `order_date` - the date of the order

  Order the result by `customer_name` ascending, then by `customer_id` ascending, then by `order_date` descending.
hints:
  - "This is a top-N-per-group problem. For each customer, you want up to N rows, ordered *within the customer* by date descending. A flat query can't do this without either a correlated subquery or a per-row positional helper."
  - "Per-row window functions that assign a position within a group are the right tool. Paired with `PARTITION BY customer ORDER BY order_date DESC`, you get a sequence number you can filter with `<= 3` in an outer query."
  - "`RANK() OVER (PARTITION BY c.customer_id ORDER BY o.order_date DESC)` (or `ROW_NUMBER` if you want strict 3, no matter the ties). Filter the outer query to the values you want to keep."
order_matters: true
solution: |
  WITH ranked AS (
    SELECT
      c.name AS customer_name,
      o.customer_id,
      o.order_id,
      o.order_date,
      RANK() OVER (PARTITION BY c.name, c.customer_id ORDER BY o.order_date DESC) AS rn
    FROM orders o
    LEFT JOIN customers c ON o.customer_id = c.customer_id
  )
  SELECT customer_name, customer_id, order_id, order_date
  FROM ranked
  WHERE rn <= 3
  ORDER BY customer_name, customer_id, order_date DESC;
expected_columns: [customer_name, customer_id, order_id, order_date]
