slug: null-safe-reporting
title: "NULL-Safe Employee Report"
difficulty: easy
category: null-handling
tags: [coalesce, null-handling, joins, self-join]
domain: hr
tables: [hr.employees, hr.departments]
description: |
  Create a clean employee report that handles NULL values gracefully.

  Some employees have no manager (`manager_id` is NULL) — these are department heads. Use a self-join to look up the manager's name, and `COALESCE` to display **'No Manager'** when there is no manager.

  Return the following columns in this exact order:
  - `name` - the employee's name
  - `manager_name` - the manager's name, or 'No Manager' if the employee has no manager
  - `department_name` - the department name
  - `salary` - the employee's salary

  Order the results by `department_name` ascending, then `salary` descending.
hints:
  - "Use a LEFT JOIN from employees to employees (aliased as m) on e.manager_id = m.id to get the manager."
  - "Use COALESCE(m.name, 'No Manager') to handle NULLs."
  - "Join to hr.departments for the department name."
starter_code: |
  SELECT
    e.name,
    -- handle NULL manager
    d.name AS department_name,
    e.salary
  FROM hr.employees e
  JOIN hr.departments d ON d.id = e.department_id
  -- add manager join
  ORDER BY department_name, salary DESC
order_matters: true
solution: |
  SELECT
    e.name,
    COALESCE(m.name, 'No Manager') AS manager_name,
    d.name AS department_name,
    e.salary
  FROM hr.employees e
  JOIN hr.departments d ON d.id = e.department_id
  LEFT JOIN hr.employees m ON m.id = e.manager_id
  ORDER BY department_name ASC, salary DESC;
expected_columns: [name, manager_name, department_name, salary]
