slug: running-revenue-total
title: "Running Revenue Total"
difficulty: medium
category: window-functions
tags: [window-functions, cumulative]
domain: ecommerce
tables: [orders]
description: |
  For every **completed** order, report the order and a running total of all completed-order revenue **up to and including that order**, with rows ordered by `order_date`.

  Return the following columns:
  - `order_date` - the date of the order
  - `total_amount` - the individual order amount
  - `running_total` - the cumulative sum of `total_amount` up to and including the current row, ordered by `order_date`

  Order the results by `order_date` ascending.
hints:
  - "A plain `GROUP BY order_date SUM(...)` won't work — that collapses rows and loses individual order amounts. You need a per-row cumulative figure."
  - "Aggregate functions in Postgres can be used as per-row window calculations with `OVER`. Give the `OVER` clause an `ORDER BY`, and the aggregate walks through the rows in that order, accumulating as it goes. That's exactly a running total."
  - "`SUM(total_amount) OVER (ORDER BY order_date)` alongside the regular columns. Filter `WHERE status = 'completed'` first."
order_matters: true
solution: |
  SELECT
    order_date,
    total_amount,
    SUM(total_amount) OVER (ORDER BY order_date ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS running_total
  FROM orders
  WHERE status = 'completed'
  ORDER BY order_date;
expected_columns: [order_date, total_amount, running_total]
