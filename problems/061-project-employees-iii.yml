slug: project-employees-iii
title: "Most Experienced Employee per Project"
difficulty: medium
category: window-functions
tags: [window-functions, joins]
domain: lc1163
tables: [project, employee]
description: |
  You are given two tables: a **Project** table that maps employees to projects, and an **Employee** table with each employee's name and years of experience.

  For each project, report the **most experienced** employee(s). If multiple employees are tied for the maximum `experience_years` on a project, **report all of them** — not an arbitrary one.

  Return the following columns in this exact order:
  - `project_id` - the project identifier
  - `employee_id` - the employee identifier

  Return the result in **any order**.
hints:
  - "This is a \"top-per-group\" problem, but with a twist: ties must be preserved (you can't just pick one winner per project). That rules out some otherwise-fine approaches."
  - "Think about the family of per-row window functions that assign ordinal positions within a group. There are three of them, and they differ in how they treat ties: one gives distinct sequential numbers even to ties, one gives the same number to ties but skips the next, and one is like the second but doesn't skip. For \"include all tied winners\", the first option fails — either of the tie-handling ones works."
  - "`RANK() OVER (PARTITION BY project_id ORDER BY experience_years DESC)`, filter `WHERE rnk = 1` in the outer query. `DENSE_RANK` would also work here — the behavior differs only after rank 1."
order_matters: false
solution: |
  WITH ranked AS (
    SELECT
      p.project_id,
      p.employee_id,
      RANK() OVER (PARTITION BY p.project_id ORDER BY e.experience_years DESC) AS rn
    FROM project p
    JOIN employee e
      ON p.employee_id = e.employee_id
  )
  SELECT project_id, employee_id
  FROM ranked
  WHERE rn = 1;
expected_columns: [project_id, employee_id]
