slug: friendly-movies-last-month
title: "Friendly Movies Streamed Last Month"
difficulty: easy
category: joins
tags: [joins, filtering, date-functions]
domain: lc1639
tables: [tv_program, content]
description: |
  You have a TV program schedule table and a content metadata table. Write a query to find the distinct titles of kid-friendly movies that were streamed in June 2020.

  A movie is kid-friendly if its `kids_content` value is 'Y', and its `content_type` is 'Movies'.

  Return the following column:
  - `title` - the title of the kid-friendly movie

  Return the result in **any order**.
hints:
  - "Join the TV program table with the content table on content_id."
  - "Filter for content where kids_content = 'Y' and content_type = 'Movies'."
  - "For the date filter, use EXTRACT(year FROM program_date) = 2020 AND EXTRACT(month FROM program_date) = 6, or a date range comparison."
starter_code: |
  SELECT
    -- your query here
  FROM content
order_matters: false
solution: |
  SELECT DISTINCT
    c.title
  FROM content c
  JOIN tv_program t
    ON c.content_id = t.content_id
  WHERE c.kids_content = 'Y'
    AND c.content_type = 'Movies'
    AND t.program_date >= '2020-06-01'
    AND t.program_date < '2020-07-01';
expected_columns: [title]
